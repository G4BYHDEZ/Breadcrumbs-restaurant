<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Página no encontrada</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
            max-width:600px;
        }

        h1{
            font-size:80px;
            color:#e74c3c;
            margin-bottom:10px;
        }

        h2{
            color:#333;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:25px;
            line-height:1.6;
        }

        a{
            display:inline-block;
            background:#3498db;
            color:white;
            text-decoration:none;
            padding:12px 25px;
            border-radius:5px;
            transition:0.3s;
        }

        a:hover{
            background:#2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Página no encontrada</h2>

        <p>
            Lo sentimos, la página que intentas visitar no existe,
            fue movida o la dirección ingresada es incorrecta.
        </p>

        <a href="/">Volver al inicio</a>
    </div>

</body>
</html>
